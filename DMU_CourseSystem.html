    border: 1px solid #e0e0e0;

  table { width: 100%; border-collapse: collapse; }
  thead { background: #9B1B30; }
  th {
    padding: 12px 16px;
    text-align: left;
    color: #fff;
    font-weight: 700;
    font-size: 13px;

  td {
    padding: 12px 16px;
    font-weight: 500;
    font-size: 14px;
    color: #111;
    border-bottom: 1px solid #eee;
  }
  tr:last-child td { border-bottom: none; }
  tr:nth-child(even) td { background: #fafafa; }

  /* ── TOAST ────────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a6b35;
    color: #fff;
    padding: 12px 28px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.3s;
    white-space: nowrap;
  }

  #toast.show { opacity: 1; }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: #888;
    font-weight: 500;
  }

  .success-wrap {
    text-align: center;
    padding: 80px 24px;
  }

  .success-wrap h2 {
    font-weight: 900;
    font-size: 28px;

    .courses-grid, .lecturers-grid, .dash-stats { grid-template-columns: 1fr; }

  }

// ── STATE ────────────────────────────────────────────────────────────────────
let currentUser = null;
let page = "home";
let param = null;

// ── HELPERS ──────────────────────────────────────────────────────────────────
function go(p, pr) {
  page = p; param = pr !== undefined ? pr : null;
  window.scrollTo(0, 0);
  render();
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}

// ── NAV UPDATE ────────────────────────────────────────────────────────────────
function updateNav() {
  // Active link
  ["home","courses","lecturers","contact"].forEach(id => {
    const el = document.getElementById("nl-" + id);
    if (el) el.className = "nav-link" + (page === id ? " active" : "");
  });

  const adminBtn = document.getElementById("nl-admin");
  if (adminBtn) adminBtn.style.display = (currentUser && currentUser.role === "admin") ? "" : "none";

  const actions = document.getElementById("nav-actions");
  if (currentUser) {
    actions.innerHTML = `
      <button class="nav-link" onclick="go('dashboard')" style="color:#9B1B30;font-weight:700">Dashboard</button>
      <span class="nav-user">Hi, ${currentUser.name.split(" ")[0]}</span>
      <button class="btn-logout" onclick="doLogout()">Log Out</button>
    `;
  } else {
    actions.innerHTML = `
      <button class="btn-nav" onclick="go('signup')">Sign Up</button>
      <button class="btn-nav" onclick="go('login')">Log In</button>
    `;
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  updateNav();
  const app = document.getElementById("app");
  const pages = { home, courses, course, lecturers, contact, login, signup, dashboard, admin };
  const fn = pages[page];
  app.innerHTML = fn ? fn() : home();
  bind();
}

// ── HOME ──────────────────────────────────────────────────────────────────────

      <h3>${c.name}</h3>
      <button class="btn-red" onclick="go('course',${c.id})">More Info</button>
    </div>
  `).join("");

  return `
    <div class="hero">
      <h1>Find Your<br>Computing Course</h1>
      <p>Explore our computing degrees and qualifications. Browse modules, meet your lecturers, and register for the course that fits your future.</p>
      <div class="hero-btns">
        <button class="btn-red" onclick="go('courses')">Browse courses</button>
        <button class="btn-red" onclick="go('signup')">Create Account</button>
      </div>
    </div>
    <div class="courses-section">
      <h2>All Courses</h2>
      <div class="courses-grid">${cards}</div>
    </div>
  `;
}

// ── COURSES ───────────────────────────────────────────────────────────────────
function courses() {
  const cards = DB.courses.map(c => `
    <div class="course-card">
      <h3>${c.name}</h3>
      <button class="btn-red" onclick="go('course',${c.id})">More Info</button>
    </div>
  `).join("");

  return `
    <div class="courses-section" style="min-height:calc(100vh - 70px)">
      <h2>All Courses</h2>
      <div class="courses-grid">${cards}</div>
    </div>
  `;
}

// ── COURSE DETAIL ─────────────────────────────────────────────────────────────
function course() {
  const c = DB.courses.find(x => x.id === param);
  if (!c) return `<div class="page-white"><p>Course not found.</p></div>`;

  const enrolled = currentUser && DB.enrollments.some(e => e.userId === currentUser.id && e.courseId === c.id);

  const modules = c.modules.map(m => `
    <div class="module-item">
      <h4>${m.title}</h4>
      <p>${m.desc}</p>
    </div>
  `).join("");

  const enrollArea = enrolled
    ? `<span class="enrolled-badge">✓ Enrolled</span>`
    : `<button class="btn-red" id="enroll-btn" onclick="doEnroll(${c.id})">${currentUser ? "Register for this Course" : "Sign In to Register"}</button>`;

  return `
    <div class="page-white">
      <button class="back-btn" onclick="go('courses')">← Back to Courses</button>
      <div class="detail-header">
        <h1>${c.name}</h1>
        <p>${c.description}</p>
        <div class="enroll-bar">
          ${enrollArea}
          <span id="enroll-msg" style="color:#1a6b35;font-weight:700;font-size:14px"></span>
        </div>
      </div>

      <div class="section-label">Modules</div>
      <div class="module-list">${modules}</div>

      <div class="section-label">Lecturer</div>
      <div class="lecturer-box">
        <div class="lecturer-avatar">${c.lecturer[0]}</div>
        <div>
          <div class="lecturer-name">${c.lecturer}</div>
          <div class="lecturer-title">${c.lecturerTitle}</div>
        </div>
      </div>
    </div>
  `;
}

function doEnroll(courseId) {
  if (!currentUser) { go('login'); return; }
  if (DB.enrollments.some(e => e.userId === currentUser.id && e.courseId === courseId)) return;
  DB.enrollments.push({ id: DB._eid++, userId: currentUser.id, courseId, enrolledAt: new Date().toISOString() });
  const btn = document.getElementById("enroll-btn");
  if (btn) btn.outerHTML = `<span class="enrolled-badge">✓ Enrolled</span>`;
  const msg = document.getElementById("enroll-msg");
  if (msg) msg.textContent = "Successfully registered!";
  toast("Registered for course!");
}

// ── LECTURERS ─────────────────────────────────────────────────────────────────
function lecturers() {
  const unique = {};
  DB.courses.forEach(c => {
    if (!unique[c.lecturer]) unique[c.lecturer] = { name: c.lecturer, title: c.lecturerTitle, courses: [] };
    unique[c.lecturer].courses.push(c.name);
  });

  const cards = Object.values(unique).map(l => `
    <div class="lecturer-card">
      <div class="av">${l.name[0]}</div>
      <h3>${l.name}</h3>
      <p>${l.title}</p>
      <p style="margin-top:8px;color:#9B1B30;font-size:12px;font-weight:700">${l.courses.join(" · ")}</p>
    </div>
  `).join("");

  return `
    <div class="page-white" style="max-width:960px">
      <h1 class="page-title">Our Lecturers</h1>
      <p class="page-sub">Meet the academic staff delivering our computing programmes</p>
      <div class="lecturers-grid">${cards}</div>
    </div>
  `;
}

// ── CONTACT ───────────────────────────────────────────────────────────────────
function contact() {
  return `
    <div class="page-white" style="max-width:960px">
      <h1 class="page-title">Contact Us</h1>
      <p class="page-sub">Get in touch with the DMU Kazakhstan Computing College</p>
      <div class="contact-grid">
        <div class="contact-info">
          <div class="section-label" style="margin-top:0">Address</div>
          <p>De Montfort University Kazakhstan<br>Almaty, Kazakhstan</p>
          <div class="section-label">Email</div>
          <p>computing@dmu.kz</p>
          <div class="section-label">Phone</div>
          <p>+7 (727) 000-0000</p>
          <div class="section-label">Office Hours</div>
          <p>Monday – Friday<br>9:00 AM – 5:00 PM</p>
        </div>
        <div>
          <div class="section-label" style="margin-top:0">Send a Message</div>
          <div class="contact-form">
            <div class="field">
              <label>Your Name</label>
              <input type="text" placeholder="Jane Smith"/>
            </div>
            <div class="field">
              <label>Email Address</label>
              <input type="email" placeholder="jane@example.com"/>
            </div>
            <div class="field">
              <label>Message</label>
              <textarea rows="5" style="width:100%;border:1px solid #ccc;border-radius:6px;padding:11px 14px;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:500;resize:vertical;outline:none" placeholder="Your message…"></textarea>
            </div>
            <button class="btn-red" onclick="toast('Message sent!')">Send Message</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function login() {
  return `
    <div class="auth-wrap">
      <h1>Welcome back</h1>
      <p>Sign in to your account to continue</p>
      <div class="form-box">
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="li-email" placeholder="you@dmu.kz"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="li-pass" placeholder="••••••••"/>
          <span class="err-msg" id="li-err"></span>
        </div>
        <button class="btn-full" onclick="doLogin()">Log In</button>
        <p style="text-align:center;margin-top:14px;font-size:12px;color:#888">
          Demo: <strong>admin@dmu.kz</strong> / <strong>admin123</strong>
        </p>
      </div>
      <div class="auth-footer">No account? <span onclick="go('signup')">Sign up here</span></div>
    </div>
  `;
}

function doLogin() {
  const email = document.getElementById("li-email").value.trim();
  const pass  = document.getElementById("li-pass").value;
  const err   = document.getElementById("li-err");
  const found = DB.users.find(u => u.email === email && u.password === pass);
  if (!found) {
    err.textContent = "Incorrect email or password.";
    err.style.display = "block";
    document.getElementById("li-pass").classList.add("err");
    return;
  }
  currentUser = found;
  toast("Welcome back, " + found.name.split(" ")[0] + "!");
  go("dashboard");
}

// ── SIGNUP ────────────────────────────────────────────────────────────────────
function signup() {
  return `
    <div class="auth-wrap">
      <h1>Create Account</h1>
      <p>Register as a new applicant</p>
      <div class="form-box">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="su-name" placeholder="Jane Smith"/>
          <span class="err-msg" id="e-name"></span>
        </div>
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="su-email" placeholder="jane@example.com"/>
          <span class="err-msg" id="e-email"></span>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="su-pass" placeholder="At least 6 characters"/>
          <span class="err-msg" id="e-pass"></span>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="su-conf" placeholder="Repeat your password"/>
          <span class="err-msg" id="e-conf"></span>
        </div>
        <button class="btn-full" onclick="doSignup()">Create Account</button>
      </div>
      <div class="auth-footer">Already registered? <span onclick="go('login')">Log in here</span></div>
    </div>
  `;
}

function se(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.style.display = msg ? "block" : "none";
}

function doSignup() {
  const name  = document.getElementById("su-name").value.trim();
  const email = document.getElementById("su-email").value.trim();
  const pass  = document.getElementById("su-pass").value;
  const conf  = document.getElementById("su-conf").value;
  se("e-name",""); se("e-email",""); se("e-pass",""); se("e-conf","");
  let ok = true;
  if (!name)              { se("e-name","Name is required.");         ok = false; }
  if (!email.includes("@")){ se("e-email","Enter a valid email.");    ok = false; }
  else if (DB.users.find(u => u.email === email)) { se("e-email","Email already in use."); ok = false; }
  if (pass.length < 6)    { se("e-pass","Minimum 6 characters.");     ok = false; }
  if (pass !== conf)      { se("e-conf","Passwords do not match.");    ok = false; }
  if (!ok) return;
  const u = { id: DB._uid++, name, email, password: pass, role: "applicant" };
  DB.users.push(u);
  currentUser = u;
  document.getElementById("app").innerHTML = `
    <div class="success-wrap">
      <div style="font-size:52px;margin-bottom:16px">✅</div>
      <h2>Account Created!</h2>
      <p style="color:#666;font-weight:500">Redirecting you to courses…</p>
    </div>
  `;
  updateNav();
  setTimeout(() => go("courses"), 1800);
}

function doLogout() {
  currentUser = null;
  toast("Logged out successfully.");
  go("home");
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function dashboard() {
  if (!currentUser) return login();
  const myEnrollments = DB.enrollments.filter(e => e.userId === currentUser.id);
  const myCourses = myEnrollments.map(e => DB.courses.find(c => c.id === e.courseId)).filter(Boolean);

  const courseCards = myCourses.length
    ? myCourses.map(c => `
        <div class="course-card" style="border:1px solid #e0e0e0;cursor:pointer" onclick="go('course',${c.id})">
          <h3>${c.name}</h3>
          <span style="background:#d4edda;color:#1a6b35;font-weight:700;font-size:13px;padding:6px 16px;border-radius:20px;border:1px solid #1a6b35">Enrolled ✓</span>
        </div>
      `).join("")
    : `<div class="empty-state"><p style="margin-bottom:16px">You have not enrolled in any courses yet.</p><button class="btn-red" onclick="go('courses')">Browse Courses</button></div>`;

  return `
    <div class="page-white" style="max-width:960px">
      <h1 class="page-title">My Dashboard</h1>
      <p class="page-sub">Welcome back, ${currentUser.name}</p>
      <div class="dash-stats">
        <div class="stat-card"><span class="num">${myCourses.length}</span><span class="lbl">Enrolled Courses</span></div>
        <div class="stat-card"><span class="num">${DB.courses.length}</span><span class="lbl">Total Courses</span></div>
        <div class="stat-card"><span class="num">${DB.modules ? DB.modules.length : DB.courses.length * 4}</span><span class="lbl">Total Modules</span></div>
      </div>
      <div class="section-label" style="margin-top:0">My Courses</div>
      <div class="courses-grid" style="background:#9B1B30;padding:24px;border-radius:6px">${courseCards}</div>
    </div>
  `;
}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
function admin() {
  if (!currentUser || currentUser.role !== "admin") return home();

  const userRows = DB.users.map(u => `
    <tr>
      <td>${u.id}</td>
      <td><strong>${u.name}</strong></td>
      <td>${u.email}</td>
      <td>${u.role}</td>
      <td>${DB.enrollments.filter(e => e.userId === u.id).length}</td>
    </tr>
  `).join("");

  const enrollRows = DB.enrollments.length
    ? DB.enrollments.map(e => {
        const u = DB.users.find(x => x.id === e.userId);
        const c = DB.courses.find(x => x.id === e.courseId);
        return `<tr><td>${u?.name}</td><td>${c?.name}</td><td>${new Date(e.enrolledAt).toLocaleString()}</td></tr>`;
      }).join("")
    : `<tr><td colspan="3" style="text-align:center;color:#888;padding:20px">No enrollments yet.</td></tr>`;

  return `
    <div class="page-white" style="max-width:960px">
      <h1 class="page-title">Admin Panel</h1>
      <p class="page-sub">System overview</p>
      <div class="dash-stats" style="grid-template-columns:repeat(4,1fr)">
        <div class="stat-card"><span class="num">${DB.users.length}</span><span class="lbl">Users</span></div>
        <div class="stat-card"><span class="num">${DB.courses.length}</span><span class="lbl">Courses</span></div>
        <div class="stat-card"><span class="num">36</span><span class="lbl">Modules</span></div>
        <div class="stat-card"><span class="num">${DB.enrollments.length}</span><span class="lbl">Enrollments</span></div>
      </div>
      <div class="section-label" style="margin-top:0">Registered Users</div>
      <div class="table-wrap">
        <table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Enrollments</th></tr></thead>
        <tbody>${userRows}</tbody></table>
      </div>
      <div class="section-label">All Enrollments</div>
      <div class="table-wrap">
        <table><thead><tr><th>Student</th><th>Course</th><th>Enrolled At</th></tr></thead>
        <tbody>${enrollRows}</tbody></table>
      </div>
    </div>
  `;
}

// ── BIND ENTER KEY ────────────────────────────────────────────────────────────
function bind() {
  if (page === "login") {
    ["li-email","li-pass"].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.onkeydown = e => { if (e.key === "Enter") doLogin(); };
    });
  }
  if (page === "signup") {
    ["su-name","su-email","su-pass","su-conf"].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.onkeydown = e => { if (e.key === "Enter") doSignup(); };
    });
  }
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
